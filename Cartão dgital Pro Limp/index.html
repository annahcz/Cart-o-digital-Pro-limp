<style>

*{

    padding:0;
    box-sizing:border-box;
}

body{

    background:#050505;
    font-family:Poppins,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    padding:30px;

.card{

    width:390px;
    max-width:100%;

    background:#0c0c0c;

    border:2px solid #caa44c;

    border-radius:25px;

    padding:45px 30px;

    box-shadow:
    0 0 35px rgba(212,175,55,.20);

    position:relative;

}

.card::before{

content:"";

position:absolute;

top:15px;
left:15px;
right:15px;
bottom:15px;

border:1px solid rgba(212,175,55,.35);

border-radius:18px;

pointer-events:none;

}

.logo{

text-align:center;

margin-bottom:40px;

}

.logo h1{

font-family:Cinzel, serif;

font-size:58px;

letter-spacing:4px;

}

.logo p{

margin-top:8px;

color:#b98e32;

font-size:14px;

letter-spacing:2px;

}

.item{

margin:22px 0;

}

.item a{

display:flex;

align-items:center;

gap:18px;

text-decoration:none;

color:#f3d38b;

padding:18px;

border-radius:14px;

border:1px solid rgba(212,175,55,.25);

transition:.35s;

}

.item a:hover{

background:#d4af37;

color:#111;

transform:translateY(-2px);

}

.icon{

width:48px;
height:48px;

border-radius:50%;

display:flex;

justify-content:center;
align-items:center;

font-size:22px;

background:#d4af37;

color:#111;

flex-shrink:0;

}

.text{

display:flex;

flex-direction:column;

}

.text strong{

font-size:17px;

}

.text span{

font-size:14px;

opacity:.85;

}

.footer{

margin-top:35px;

text-align:center;

color:#95702d;

font-size:12px;

letter-spacing:1px;

}
